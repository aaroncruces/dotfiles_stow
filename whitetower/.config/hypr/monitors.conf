# # === ANIMATED WALLPAPER (same video on all monitors) ===
# # === RANDOM ANIMATED WALLPAPER (picks one video at random on every login) ===
# exec-once = sh -c 'mpvpaper -o "--loop --no-audio --hwdec=auto --input-ipc-server=/tmp/mpvsocket" "*" "$(find /home/aaron/Videos/wallpapers -type f \( -name "*.mp4" -o -name "*.webm" -o -name "*.mkv" \) | shuf -n 1)"'
# # === AUTO-PAUSE WHEN WORKSPACE HAS WINDOWS ===
# exec-once = ~/.config/hypr/scripts/mpvpaper-pause.sh

# === RANDOM ANIMATED WALLPAPERS (different per monitor) + AUTO-PAUSE ===

# Monitor 1 - Lenovo
exec-once = sh -c 'VIDEO=$(find "/home/aaron/Videos/wallpapers" -type f \( -iname "*.mp4" -o -iname "*.webm" -o -iname "*.mkv" -o -iname "*.gif" \) | shuf -n 1); [ -n "$VIDEO" ] && mpvpaper -o "--loop --no-audio --hwdec=auto --input-ipc-server=/tmp/mpvsocket-lenovo --panscan=1.0" "desc:Lenovo Group Limited L1951p Wide   6V6A4410" "$VIDEO"'

# Monitor 2 - BenQ
exec-once = sh -c 'VIDEO=$(find "/home/aaron/Videos/wallpapers" -type f \( -iname "*.mp4" -o -iname "*.webm" -o -iname "*.mkv" -o -iname "*.gif" \) | shuf -n 1); [ -n "$VIDEO" ] && mpvpaper -o "--loop --no-audio --hwdec=auto --input-ipc-server=/tmp/mpvsocket-benq --panscan=1.0" "desc:BNQ BenQ EX2780Q 32M01997019" "$VIDEO"'

# Monitor 3 - HP
exec-once = sh -c 'VIDEO=$(find "/home/aaron/Videos/wallpapers" -type f \( -iname "*.mp4" -o -iname "*.webm" -o -iname "*.mkv" -o -iname "*.gif" \) | shuf -n 1); [ -n "$VIDEO" ] && mpvpaper -o "--loop --no-audio --hwdec=auto --input-ipc-server=/tmp/mpvsocket-hp --panscan=1.0" "desc:Hewlett Packard HP L1950 CNK8260PLG" "$VIDEO"'

# Auto-pause (with delay so mpvpaper starts first)
exec-once = sleep 5 && ~/gits/mpvpaper-stop/build/mpvpaper-stop -p /tmp/mpvsocket-lenovo --fork
exec-once = sleep 5 && ~/gits/mpvpaper-stop/build/mpvpaper-stop -p /tmp/mpvsocket-benq --fork
exec-once = sleep 5 && ~/gits/mpvpaper-stop/build/mpvpaper-stop -p /tmp/mpvsocket-hp --fork

exec-once = waybar
